# Model Configuration File
# Define available models and their configurations

image_models:
  mobilenet_v2:
    name: "MobileNetV2"
    input_shape: [224, 224, 3]
    weights: "imagenet"
    trainable_top_layers: 20
    description: "Lightweight model for mobile deployment"
    
  resnet50:
    name: "ResNet50"
    input_shape: [224, 224, 3]
    weights: "imagenet"
    trainable_top_layers: 30
    description: "Deep residual network with excellent accuracy"
    
  efficientnet_b0:
    name: "EfficientNetB0"
    input_shape: [224, 224, 3]
    weights: "imagenet"
    trainable_top_layers: 25
    description: "Efficient architecture with balanced performance"
    
  vgg16:
    name: "VGG16"
    input_shape: [224, 224, 3]
    weights: "imagenet"
    trainable_top_layers: 15
    description: "Classic CNN architecture"

text_models:
  distilbert:
    name: "distilbert-base-uncased"
    max_length: 512
    num_labels: 2
    description: "Fast and efficient BERT variant"
    
  bert:
    name: "bert-base-uncased"
    max_length: 512
    num_labels: 2
    description: "Standard BERT model"
    
  roberta:
    name: "roberta-base"
    max_length: 512
    num_labels: 2
    description: "Optimized BERT model"

tabular_models:
  neural_network:
    hidden_layers: [128, 64, 32]
    activation: "relu"
    dropout: 0.3
    description: "Feedforward neural network"
    
  automl:
    max_trials: 10
    epochs_per_trial: 10
    description: "Automated model search"

detection_models:
  yolov5:
    name: "YOLOv5"
    input_shape: [640, 640, 3]
    confidence_threshold: 0.5
    iou_threshold: 0.45
    description: "Real-time object detection"

segmentation_models:
  unet:
    name: "U-Net"
    input_shape: [256, 256, 3]
    description: "Standard U-Net for segmentation"
