version: '3.8'

services:
  modelflow:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: modelflow_app
    ports:
      - "5000:5000"
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ../data:/app/data
      - ../models_storage:/app/models_storage
      - ../logs:/app/logs
    restart: unless-stopped
    networks:
      - modelflow_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  modelflow_network:
    driver: bridge

volumes:
  data_volume:
  models_volume:
  logs_volume:
