<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODELFLOW - AI Model Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #00d97e;
            --primary-rgb: 0, 217, 126;
            --accent-cyan: #00ffa3;
            --dark-bg: #0a0a0a;
            --darker-bg: #0f0f0f;
            --light-text: #f8fafc;
            --font-stack: 'Poppins', system-ui, sans-serif;

        }

        [data-theme="light"] {
            --primary-green: #0066cc;
            --primary-rgb: 0, 102, 204;
            --accent-cyan: #00a2ff;
            --dark-bg: #f5f7fa;
            --darker-bg: #ffffff;
            --light-text: #1a1a1a;

        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--dark-bg);
            color: var(--light-text);
            overflow-x: hidden;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Animated Hero Section */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, 
                rgba(10, 10, 10, 0.98) 0%,
                rgba(0, 217, 126, 0.08) 50%,
                rgba(10, 10, 10, 0.98) 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 25%,
                rgba(0, 217, 126, 0.08) 50%,
                transparent 75%
            );
            animation: backgroundFlow 20s linear infinite;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
            padding: 2rem;
            text-align: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 2rem;
            background: rgba(0, 217, 126, 0.1);
            border: 1px solid rgba(0, 217, 126, 0.3);
            border-radius: 100px;
            color: var(--primary-green);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }

        h1 {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #fff 30%, var(--primary-green));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGlow 3s ease-in-out infinite alternate;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            opacity: 0.9;
            color: var(--light-text);
            font-weight: 400;
        }

        /* Animated Buttons */
        .cta-buttons {
            margin-top: 2.5rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .btn {
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.4s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-green), var(--accent-cyan));
            color: #000;
            box-shadow: 0 10px 30px rgba(0, 217, 126, 0.3);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transition: 0.6s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 217, 126, 0.4);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-outline {
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
            background: transparent;
        }

        .btn-outline:hover {
            background: rgba(0, 217, 126, 0.1);
            transform: translateY(-3px);
        }


        /* Particle Canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Animations */
        @keyframes backgroundFlow {
            0% { transform: translateX(-25%) rotate(45deg); }
            100% { transform: translateX(25%) rotate(45deg); }
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(0, 217, 126, 0.3); }
            100% { text-shadow: 0 0 25px rgba(0, 217, 126, 0.6); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Scroll Animations */
        .animate-on-scroll {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s ease;
        }

        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .hero p { font-size: 1.1rem; }
            .cta-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Particle Canvas Background -->
    <canvas id="particle-canvas"></canvas>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge animate-on-scroll">
                <i class="fas fa-bolt"></i>
                <span>Powered by Advanced AI</span>
            </div>
            <h1 class="animate-on-scroll">MODELFLOW</h1>
            <p class="animate-on-scroll">Turn natural language into production-ready machine learning models. Build, train, and deploy AI with zero code.</p>
            <div class="cta-buttons">
                <a href="{{ url_for('main.chat_page') }}" class="btn btn-primary animate-on-scroll">
                    <i class="fas fa-rocket"></i> Start Building
                </a>
                <a href="#" class="btn btn-outline animate-on-scroll">
                    <i class="fas fa-play"></i> Explore Features
                </a>
            </div>
        </div>
    </section>

    <script>
        // Particle Animation
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(0, 217, 126, ${this.size/4})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array(80).fill().map(() => new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
        window.addEventListener('resize', init);

        // Intersection Observer for scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate-on-scroll').forEach((el) => {
            observer.observe(el);
        });


        // Initialize theme
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</body>
</html>
